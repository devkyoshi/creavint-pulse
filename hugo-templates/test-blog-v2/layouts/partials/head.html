<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
{{ with .OutputFormats.Get "rss" }}<link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">{{ end }}
<style>
  :root { --primary: {{ .Site.Params.primaryColor | default "#1a73e8" }}; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; line-height: 1.7; max-width: 760px; margin: 0 auto; padding: 0 1rem; color: #1f2430; }
  a { color: var(--primary); }
  .site-header, .site-footer { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; gap: 1rem; flex-wrap: wrap; }
  .site-header .logo { font-weight: 700; font-size: 1.25rem; text-decoration: none; }
  .site-footer { border-top: 1px solid #e3e6ec; font-size: .875rem; color: #5b6372; }
  .post-list { list-style: none; padding: 0; }
  .post-list li { margin-bottom: 1.25rem; }
  .meta { color: #5b6372; font-size: .875rem; }
  img { max-width: 100%; height: auto; }
</style>
